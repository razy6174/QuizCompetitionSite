<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ガチコース ランキング - Quiz App</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div id="app">
    
    <h2>🏆 ガチコース ランキング 🏆</h2>

    <div id="pagination-container" class="pagination-wrapper">
      <button id="prev-page-btn" class="btn-pagination"></button>
      <span id="current-page-info" class="page-info"></span>
      <button id="next-page-btn" class="btn-pagination"></button>
    </div>

    <div id="podium-container" class="podium-area" style="display: none;">
      
      <div class="podium-box rank-2-box">
        <div class="podium-rank">2位</div>
        <div class="podium-name" id="podium-name-2">-</div>
        <div class="podium-score" id="podium-score-2">-</div>
        <div class="podium-time" id="podium-time-2">-</div> </div>
      
      <div class="podium-box rank-1-box">
        <div class="podium-rank">1位 👑</div>
        <div class="podium-name" id="podium-name-1">-</div>
        <div class="podium-score" id="podium-score-1">-</div>
        <div class="podium-time" id="podium-time-1">-</div> </div>
      
      <div class="podium-box rank-3-box">
        <div class="podium-rank">3位</div>
        <div class="podium-name" id="podium-name-3">-</div>
        <div class="podium-score" id="podium-score-3">-</div>
        <div class="podium-time" id="podium-time-3">-</div> </div>

    </div>

    <div id="ranking-container">
      <table id="ranking-table">
        <thead>
          <tr>
            <th>順位</th>
            <th>プレイヤー</th>
            <th>スコア</th>
            <th>タイム</th>
          </tr>
        </thead>
        <tbody id="ranking-body">
          <tr><td colspan="4">読み込み中...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="back-btn-container">
      <button id="back-to-course-btn" class="btn-secondary">
        コース選択へ戻る
      </button>
    </div>

  </div>
  <script type="module" src="./src/pages/ranking.js"></script>
</body>
</html>
