<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>エンジョイコース</title>
</head>
<body>
  <div class="user-info">
        <span class="user-badge">探検家</span>
        <strong id="header-user-name">読み込み中...</strong>
  </div>

  <div id="start-screen">
    <h1>🔥 エンジョイコースへようこそ！</h1>
    <p style="font-size: 1.2rem; font-weight: bold; margin-bottom: 2rem; color: #059669;">
      クイズは全部で【 10問 】
    </p>
    <!--<p>準備ができたらスタートを押してください。</p>-->
    <button id="start-btn">クイズスタート！</button>
  </div>

  <div id="quiz-screen" style="display: none;">
    <h3 id="question-number">第1問</h3>
    
    <h2 id="question-text">読み込み中...</h2>
    
    <img id="question-image" src="" alt="クイズ画像" style="display: none; max-width: 100%; border-radius: 8px; margin-bottom: 1rem;">
    
    <div id="choices-container">
      <button class="choice-btn"></button>
      <button class="choice-btn"></button>
      <button class="choice-btn"></button>
      <button class="choice-btn"></button>
    </div>
  </div>

  <div id="result-screen" style="display: none;">
  
  <p>エンジョイコースの最終結果</p>
  
  <div class="score-container">
    <span id="player-name-display">あなた</span>のスコア<br>
    <span id="final-score-display">0</span> / 10
  </div>

  <div class="action-container">
    <p>今後のサービス向上のため、アンケート回答にご協力をお願いします！</p>
    
    <a target="_blank" rel="noopener noreferrer" class="btn-primary" id="survey-btn" href="https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=Xbxum3IjmUClZWULy8MnTzUwrehYwHpIkcmkEPqbHuRUNDhDNlgzM1lZVkVZSjZQTFlBNzVHRFlaTy4u">
      📝 アンケートに回答する
    </a>

    <button id="back-to-course-btn" class="btn-secondary">
      コース選択画面に戻る
    </button>
  </div>

</div>


  <script type="module" src="./src/pages/enjoy.js"></script>
</body>
</html>
