<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ガチコース</title>
</head>
<body>
  
  <div class="gachi-wrapper">
    
    <div class="header-area">
      <div class="user-info">
        <span class="user-badge">探検家</span>
        <strong id="header-user-name">読み込み中...</strong>
      </div>
    </div>

    <div id="countdown-screen" class="gachi-card">
      <h2>ガチコース解禁まで<br>あと少し！</h2>
      
      <p class="countdown-desc">
        このコースは<br>
        <span class="countdown-date">6月29日 0:00</span><br>
        からスタートします！
      </p>
      
      <div id="countdown-timer" class="countdown-timer-text">
        --:--:--
      </div>

      <div class="action-container">
        <button id="back-to-course-from-countdown" class="btn-secondary">
          コース選択画面に戻る
        </button>
      </div>
    </div>

    <div id="start-screen" class="gachi-card">
      <h2>ガチコースに挑戦</h2>
      
      <div class="warning-box">
        <strong>⚠️ 注意事項</strong>
        <ul class="warning-list">
          <li>このコースは<strong>1人1回</strong>しか挑戦できません。</li>
          <li>「正解数」と「クリアタイム」でランキングが決定します。</li>
          <li>途中でページを閉じると記録が残りません。</li>
        </ul>
      </div>

      <button id="start-btn" class="btn-primary">
        準備ができたらスタート！
      </button>
    </div>

    <div id="quiz-screen" class="gachi-card" style="display: none;">
      <header class="quiz-header">
        <span id="question-progress" class="progress-text">1 / 15 問目</span>
        <span id="timer-display" class="timer-text">⏱ 00:00</span>
      </header>

      <h2 id="question-text" class="question-text"></h2>
      
      <div class="choices-container">
        <button class="choice-btn"></button>
        <button class="choice-btn"></button>
        <button class="choice-btn"></button>
        <button class="choice-btn"></button>
      </div>
    </div>

    <div id="result-screen" class="gachi-card" style="display: none;">
      <h2>お疲れ様でした！</h2>
      <p style="font-weight: bold; color: #6d4c41;">ガチコースの最終結果</p>
      
      <div class="score-container">
        <span id="player-name-display">あなた</span>のスコア<br>
        <span id="final-score-display">0</span> / 15
        <div id="rank-display">ランキング: --</div>
      </div>

      <div class="action-container">
        <p style="font-size: 14px; font-weight: bold;">今後のサービス向上のため、アンケート回答にご協力をお願いします！</p>
        
        <a target="_blank" rel="noopener noreferrer" class="btn-primary" id="survey-btn" href="https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=Xbxum3IjmUClZWULy8MnTzUwrehYwHpIkcmkEPqbHuRUNDhDNlgzM1lZVkVZSjZQTFlBNzVHRFlaTy4u">
          📝 アンケートに回答する
        </a>

        <button id="back-to-course-btn" class="btn-secondary">
          コース選択画面に戻る
        </button>
      </div>
    </div>

  </div> <script type="module" src="./src/pages/gachi.js"></script>
</body>
</html>
