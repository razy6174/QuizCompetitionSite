<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ガチコース</title>
</head>
<body>
  
  <div id="start-screen">
    <h1>🔥 ガチコースへようこそ！</h1>
    <p>準備ができたらスタートを押してください。</p>
    <button id="start-btn">クイズスタート！</button>
  </div>

  <div id="quiz-screen" style="display: none;">
    <h3 id="question-number">第1問</h3>
    
    <h2 id="question-text">読み込み中...</h2>
    
    <div id="choices-container">
      <button class="choice-btn"></button>
      <button class="choice-btn"></button>
      <button class="choice-btn"></button>
      <button class="choice-btn"></button>
    </div>
  </div>

<div id="result-screen" style="display: none;">
  
  <h2>お疲れ様でした！</h2>
  <p>ガチコースの最終結果</p>
  
  <div class="score-container">
    あなたのスコア<br>
    <span id="final-score-display">0</span> / 15
  </div>

  <div class="action-container">
    <p>今後のサービス向上のため、アンケート回答にご協力をお願いします！</p>
    
    <a target="_blank" rel="noopener noreferrer" class="btn-primary" id="survey-btn" href="https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=Xbxum3IjmUClZWULy8MnTzUwrehYwHpIkcmkEPqbHuRUNDhDNlgzM1lZVkVZSjZQTFlBNzVHRFlaTy4u">
      📝 アンケートに回答する
    </a>

    <button id="back-to-course-btn" class="btn-secondary">
      コース選択画面に戻る
    </button>
  </div>

</div>

  <script type="module" src="./src/pages/gachi.js"></script>
</body>
</html>
